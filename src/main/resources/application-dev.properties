spring.datasource.url=jdbc:postgresql://localhost:5432/quid
spring.datasource.username=
spring.datasource.password=

# Schema: auto-update on startup so local changes apply immediately
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console to debug queries during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging verbose security logs suppressed, app logs at DEBUG
logging.level.org.example.quid=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
