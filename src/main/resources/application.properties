spring.profiles.active=dev
spring.application.name=quid
spring.threads.virtual.enabled=true
spring.jpa.open-in-view=false

# Knowledge document uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Active profile — override with -Dspring.profiles.active=dev|prod

# AI config — single OpenRouter key for both chat and embeddings
ai.open-router-api-key=${OPENROUTER_API_KEY:}
ai.chat-model=anthropic/claude-haiku-4-5-20251001
ai.embedding-model=openai/text-embedding-3-small
ai.max-history-messages=10
ai.rag-top-k=5
ai.memory-depth=3

# Telegram userbot sidecar
app.userbot.url=${USERBOT_URL:http://localhost:8090}
app.userbot.internal-token=${USERBOT_INTERNAL_TOKEN:change-me}

# JWT (shared, secret must be overridden in prod via env var)
app.jwt.secret=${JWT_SECRET:quid-super-secret-key-change-this-in-production-env}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000
