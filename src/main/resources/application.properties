spring.application.name=quid
spring.threads.virtual.enabled=true

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/quid
spring.datasource.username=
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# AI — set via env vars in production
ai.anthropic-api-key=${ANTHROPIC_API_KEY:}
ai.anthropic-model=claude-haiku-4-5-20251001
ai.openai-api-key=${OPENAI_API_KEY:}
ai.max-history-messages=10
ai.rag-top-k=5

# JWT — set JWT_SECRET env var (32+ char random) before running
app.jwt.secret=${JWT_SECRET:quid-super-secret-key-change-this-in-production-env}
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000